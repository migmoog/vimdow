name: Build Vimdow

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch, tag, or commit to run on"
        required: true
        default: 'master'

defaults:
  run:
    shell: bash

jobs:
  build_library:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        profile: [debug, release]
        include:
          - libfile: libvimdow.so
            os: ubuntu-latest
          - libfile: libvimdow.dylib
            os: macos-latest
          - libfile: vimdow.dll
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.ref }}

      - uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Build ${{ matrix.profile }}
        run: cargo build --manifest-path rust/Cargo.toml $([ "${{ matrix.profile }}" = "release" ] && echo "--release")

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: vimdow-lib-${{ matrix.profile }}-${{ matrix.os }}
          path: |
            rust/target/${{ matrix.profile }}/${{ matrix.libfile }}

  release:
    needs: build_library
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Download debug artifacts
        uses: actions/download-artifact@v8
        with:
          merge-multiple: true
          pattern: vimdow-lib-debug-*
          path: godot/addons/vimdow/bin/debug

      - name: Download release artifacts
        uses: actions/download-artifact@v8
        with:
          merge-multiple: true
          pattern: vimdow-lib-release-*
          path: godot/addons/vimdow/bin/release

      - name: Make exports directory
        run: |
          mkdir exports

      - name: Export standalone
        uses: firebelley/godot-export@v7.0.0
        id: export
        with:
          godot_executable_download_url: "https://downloads.godotengine.org/?version=4.6.2&flavor=stable&slug=linux.x86_64.zip&platform=linux.64"
          godot_export_templates_download_url: "https://downloads.godotengine.org/?version=4.6.2&flavor=stable&slug=export_templates.tpz&platform=templates"
          relative_project_path: ./godot/
          archive_output: true
          archive_root_folder: true


      - name: Add README and LICENSE
        run: |
          cp README.md godot/addons/vimdow/README.md
          cp LICENSE godot/addons/vimdow/LICENSE

      - name: Zip plugin
        run: |
          cd godot
          zip -r ../vimdow-plugin.zip addons/

      - uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            vimdow-plugin.zip
            ${{ steps.export.outputs.archive_directory }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
